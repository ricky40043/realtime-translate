services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rt
      POSTGRES_USER: user
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network

  redis:
    image: redis:7
    volumes:
      - redis_data:/data
    networks:
      - app-network

  backend:
    build: ./backend
    env_file: .env
    depends_on:
      - db
      - redis
    environment:
      - POSTGRES_URL=postgres://user:postgres@db:5432/rt
      - REDIS_URL=redis://redis:6379
    networks:
      - app-network

  frontend:
    build: ./frontend
    environment:
      - NODE_ENV=production
    networks:
      - app-network

  nginx:
    build: ./nginx
    depends_on:
      - backend
      - frontend
    ports:
      - "3100:80"
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
