services:
  # ── 單一 Docker 服務（nginx + uvicorn 合一）──────────────────────
  - type: web
    name: polyglot-chat
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: POSTGRES_URL
        fromDatabase:
          name: polyglot-chat-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: TRANSLATE_PROVIDER
        value: free
      - key: STT_PROVIDER
        value: groq
      # 請在 Render Dashboard 手動設定：
      - key: GROQ_API_KEY
        sync: false

# ── PostgreSQL ────────────────────────────────────────────────────
databases:
  - name: polyglot-chat-db
    plan: free
    databaseName: rt
    user: rt_user
